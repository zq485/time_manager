<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>期末考试时间管理</title>
  <style>
    :root {
      --primary: #6c63ff;
      --danger: #ff4757;
      --warning: #ffa502;
      --success: #2ed573;
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card2: #16213e;
      --text: #e8e8f0;
      --muted: #8888aa;
      --border: #2a2a4a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }
    h1 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #6c63ff, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 28px;
    }

    .add-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      max-width: 560px;
      margin: 0 auto 32px;
    }
    .add-card h2 { font-size: 1rem; color: var(--muted); margin-bottom: 16px; letter-spacing: 1px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 140px; }
    label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="datetime-local"], input[type="color"] {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--primary); }
    input[type="color"] { padding: 4px 8px; height: 42px; cursor: pointer; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 22px; border-radius: 10px; border: none;
      font-size: 0.92rem; font-weight: 600; cursor: pointer;
      transition: transform .15s, opacity .15s;
    }
    .btn:hover { transform: translateY(-1px); opacity: .9; }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: var(--primary); color: #fff; width: 100%; justify-content: center; margin-top: 14px; }
    .btn-sm { padding: 6px 14px; font-size: 0.8rem; border-radius: 8px; }
    .btn-danger { background: #ff475720; color: var(--danger); border: 1px solid #ff475730; }
    .btn-export { background: #2ed57320; color: var(--success); border: 1px solid #2ed57330; }

    .notify-banner {
      background: linear-gradient(135deg, #6c63ff22, #a855f722);
      border: 1px solid #6c63ff40;
      border-radius: 12px;
      padding: 14px 18px;
      max-width: 560px;
      margin: 0 auto 24px;
      display: flex; align-items: center; gap: 12px;
      font-size: 0.88rem;
    }
    .notify-banner span { flex: 1; }
    .notify-banner.hidden { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .exam-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .exam-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px #0008; }
    .exam-subject { font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; }
    .exam-date { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; }

    .countdown-main { display: flex; align-items: baseline; gap: 6px; margin-bottom: 12px; }
    .countdown-days { font-size: 3rem; font-weight: 800; line-height: 1; }
    .countdown-unit { font-size: 1rem; color: var(--muted); }
    .countdown-hms {
      font-size: 0.85rem; color: var(--muted); margin-bottom: 14px;
      font-variant-numeric: tabular-nums;
    }

    .progress-wrap { background: var(--card2); border-radius: 99px; height: 6px; margin-bottom: 14px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 99px; transition: width .5s ease; }

    .milestones { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .badge { font-size: 0.72rem; padding: 3px 10px; border-radius: 99px; font-weight: 600; }
    .badge.done    { background: #2ed57320; color: var(--success); border: 1px solid #2ed57340; }
    .badge.pending { background: #ffffff08; color: var(--muted);   border: 1px solid var(--border); }
    .badge.near    { background: #ffa50220; color: var(--warning);  border: 1px solid #ffa50240; animation: pulse 1.5s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    .card-actions { display: flex; gap: 8px; }
    .status-chip {
      display: inline-block; font-size: 0.72rem; font-weight: 700;
      padding: 3px 10px; border-radius: 99px; margin-bottom: 8px;
    }
    .status-urgent { background: #ff475720; color: var(--danger);  border: 1px solid #ff475740; }
    .status-warn   { background: #ffa50220; color: var(--warning); border: 1px solid #ffa50240; }
    .status-ok     { background: #6c63ff20; color: var(--primary); border: 1px solid #6c63ff40; }
    .status-done   { background: #2ed57320; color: var(--success); border: 1px solid #2ed57340; }

    .empty-state { text-align: center; color: var(--muted); padding: 48px 0; grid-column: 1/-1; }
    .empty-icon  { font-size: 3rem; margin-bottom: 12px; }

    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e; border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 22px;
      font-size: 0.9rem; color: var(--text);
      box-shadow: 0 8px 32px #0008;
      transition: transform .3s ease; z-index: 9999; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .section-title {
      text-align: center; font-size: 0.78rem; color: var(--muted);
      letter-spacing: 2px; margin-bottom: 16px;
      max-width: 1100px; margin-left: auto; margin-right: auto;
    }
  </style>
</head>
<body>

<h1>📚 期末考试管理</h1>
<p class="subtitle">添加考试科目 · 实时倒计时 · 14/7/3/1天自动提醒</p>

<div class="notify-banner" id="notifyBanner">
  <span>🔔 开启浏览器通知，考前 14天 / 7天 / 3天 / 1天 自动弹出提醒</span>
  <button class="btn btn-primary btn-sm" style="margin-top:0;width:auto" onclick="requestNotify()">开启提醒</button>
</div>

<div class="add-card">
  <h2>＋ 添加考试</h2>
  <div class="form-row">
    <div class="form-group" style="flex:2">
      <label>科目名称</label>
      <input type="text" id="subjectInput" placeholder="例：高等数学、英语四级" maxlength="30"
             onkeydown="if(event.key==='Enter')addExam()">
    </div>
    <div class="form-group">
      <label>标记颜色</label>
      <input type="color" id="colorInput" value="#6c63ff">
    </div>
  </div>
  <div class="form-row" style="margin-top:12px">
    <div class="form-group">
      <label>考试时间</label>
      <input type="datetime-local" id="dateInput">
    </div>
  </div>
  <button class="btn btn-primary" onclick="addExam()">添加考试 →</button>
</div>

<p class="section-title" id="sectionTitle"></p>
<div class="grid" id="grid"></div>
<div id="toast"></div>

<script>
const MILESTONES = [14, 7, 3, 1];
let exams = JSON.parse(localStorage.getItem('exams_v2') || '[]');
let timers = {};

/* ── 通知 ── */
function updateNotifyBanner() {
  const b = document.getElementById('notifyBanner');
  if (!('Notification' in window) || Notification.permission === 'granted')
    b.classList.add('hidden');
}

async function requestNotify() {
  if (!('Notification' in window)) { toast('此浏览器不支持通知'); return; }
  const p = await Notification.requestPermission();
  if (p === 'granted') {
    toast('✅ 通知已开启！页面保持打开时会自动提醒你');
    document.getElementById('notifyBanner').classList.add('hidden');
  } else {
    toast('未获得权限，提醒将以页面弹窗形式显示');
  }
}

function scheduleNotifications(exam) {
  const now    = Date.now();
  const examTs = new Date(exam.date).getTime();
  MILESTONES.forEach(days => {
    const alertTs = examTs - days * 86400000;
    const key     = `ntf_${exam.id}_${days}`;
    // 补发：若提醒时间在过去 24h 内且未发过
    if (alertTs <= now && now - alertTs < 86400000 && !localStorage.getItem(key)) {
      localStorage.setItem(key, '1');
      sendNotification(exam, days);
      return;
    }
    const delay = alertTs - now;
    if (delay > 0) {
      setTimeout(() => {
        if (localStorage.getItem(key)) return;
        localStorage.setItem(key, '1');
        sendNotification(exam, days);
      }, delay);
    }
  });
}

function sendNotification(exam, days) {
  const title = `📅 考试提醒：${exam.subject}`;
  const body  = days > 0
    ? `距考试还有 ${days} 天！时间：${formatDate(exam.date)}`
    : `今天就是考试！加油！时间：${formatDate(exam.date)}`;
  if (Notification.permission === 'granted') {
    new Notification(title, { body });
  } else {
    toast(`🔔 ${title}  ${body}`, 7000);
  }
}

/* ── 导出 .ics（Windows 日历 / 提醒事项） ── */
function exportICS(id) {
  const exam = exams.find(e => e.id === id);
  if (!exam) return;
  const dt   = new Date(exam.date);
  const dtE  = new Date(dt.getTime() + 2 * 3600000);
  const fmt  = d => d.toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z';
  const lines = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//ExamManager//ZH',
    'CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `DTSTART:${fmt(dt)}`,
    `DTEND:${fmt(dtE)}`,
    `SUMMARY:📝 ${exam.subject} 考试`,
    `DESCRIPTION:期末考试管理工具导出`,
    `UID:exam-${exam.id}@mgr`,
  ];
  MILESTONES.forEach(d => {
    lines.push(
      'BEGIN:VALARM','ACTION:DISPLAY',
      `DESCRIPTION:距「${exam.subject}」考试还有 ${d} 天！`,
      `TRIGGER:-P${d}D`,
      'END:VALARM'
    );
  });
  lines.push('END:VEVENT','END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${exam.subject}_考试.ics`;
  a.click();
  toast(`📅 已下载 .ics 文件，双击导入系统日历即可获得系统级提醒`);
}

/* ── CRUD ── */
function addExam() {
  const subject = document.getElementById('subjectInput').value.trim();
  const date    = document.getElementById('dateInput').value;
  const color   = document.getElementById('colorInput').value;
  if (!subject) { toast('请输入科目名称'); return; }
  if (!date)    { toast('请选择考试时间'); return; }
  if (new Date(date) <= new Date()) { toast('考试时间需在未来'); return; }
  const exam = { id: Date.now(), subject, date, color };
  exams.push(exam);
  save();
  scheduleNotifications(exam);
  document.getElementById('subjectInput').value = '';
  document.getElementById('dateInput').value    = '';
  toast(`✅ 已添加「${subject}」`);
  render();
}

function deleteExam(id) {
  if (!confirm('确认删除此考试？')) return;
  exams = exams.filter(e => e.id !== id);
  if (timers[id]) { clearInterval(timers[id]); delete timers[id]; }
  save(); render(); toast('已删除');
}

function save() { localStorage.setItem('exams_v2', JSON.stringify(exams)); }

/* ── 工具函数 ── */
function formatDate(d) {
  const dt   = new Date(d);
  const week = ['日','一','二','三','四','五','六'][dt.getDay()];
  return `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}（周${week}）`
       + ` ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
}

function getStatus(days) {
  if (days < 0)  return ['status-done',   '已结束'];
  if (days < 1)  return ['status-urgent', '今天考试！'];
  if (days < 3)  return ['status-urgent', '紧急冲刺'];
  if (days < 7)  return ['status-warn',   '加油备考'];
  if (days < 14) return ['status-warn',   '按计划复习'];
  return              ['status-ok',    '从容备考'];
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── 渲染 ── */
function render() {
  const grid  = document.getElementById('grid');
  const title = document.getElementById('sectionTitle');
  Object.values(timers).forEach(clearInterval);
  timers = {};

  const sorted = [...exams].sort((a,b) => new Date(a.date)-new Date(b.date));
  title.textContent = exams.length ? `共 ${exams.length} 门考试` : '';

  if (!sorted.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📖</div>还没有考试，快去添加吧</div>`;
    return;
  }

  grid.innerHTML = sorted.map(exam => {
    const days = (new Date(exam.date) - new Date()) / 86400000;
    const [sc, sl] = getStatus(days);
    return `
    <div class="exam-card" id="card-${exam.id}">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${exam.color}"></div>
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:4px">
        <div class="exam-subject" style="color:${exam.color}">${escHtml(exam.subject)}</div>
        <span class="status-chip ${sc}" id="chip-${exam.id}">${sl}</span>
      </div>
      <div class="exam-date">📅 ${formatDate(exam.date)}</div>
      <div class="countdown-main">
        <span class="countdown-days" id="days-${exam.id}" style="color:${exam.color}">-</span>
        <span class="countdown-unit">天</span>
      </div>
      <div class="countdown-hms" id="hms-${exam.id}">--:--:--</div>
      <div class="progress-wrap">
        <div class="progress-bar" id="prog-${exam.id}" style="background:${exam.color};width:0%"></div>
      </div>
      <div class="milestones" id="ms-${exam.id}"></div>
      <div class="card-actions">
        <button class="btn btn-sm btn-export" onclick="exportICS(${exam.id})">📅 导出日历</button>
        <button class="btn btn-sm btn-danger" onclick="deleteExam(${exam.id})">删除</button>
      </div>
    </div>`;
  }).join('');

  sorted.forEach(startTimer);
}

function startTimer(exam) {
  function tick() {
    const diff    = new Date(exam.date) - new Date();
    const daysEl  = document.getElementById(`days-${exam.id}`);
    const hmsEl   = document.getElementById(`hms-${exam.id}`);
    const progEl  = document.getElementById(`prog-${exam.id}`);
    const msEl    = document.getElementById(`ms-${exam.id}`);
    const chipEl  = document.getElementById(`chip-${exam.id}`);
    if (!daysEl) { clearInterval(timers[exam.id]); return; }

    if (diff <= 0) {
      daysEl.textContent    = '0';
      hmsEl.textContent     = diff < -7200000 ? '已结束' : '考试进行中 🎯';
      progEl.style.width    = '100%';
      if (chipEl) { chipEl.className = 'status-chip status-done'; chipEl.textContent = '已结束'; }
      clearInterval(timers[exam.id]);
      return;
    }

    const totalDays = Math.floor(diff / 86400000);
    const h  = Math.floor((diff % 86400000) / 3600000);
    const m  = Math.floor((diff % 3600000)  / 60000);
    const s  = Math.floor((diff % 60000)    / 1000);

    daysEl.textContent = totalDays;
    hmsEl.textContent  = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} 后`;

    // 进度条（以30天为满）
    const pct = Math.min(100, Math.max(0, (1 - diff / (30 * 86400000)) * 100));
    progEl.style.width = pct + '%';

    // 状态
    const [cls, lbl] = getStatus(diff / 86400000);
    if (chipEl) { chipEl.className = `status-chip ${cls}`; chipEl.textContent = lbl; }

    // 里程碑
    if (msEl) {
      const dLeft = diff / 86400000;
      msEl.innerHTML = MILESTONES.map(d => {
        let c2, t2;
        if (dLeft > d + 1)      { c2='pending'; t2=`${d}天提醒`; }
        else if (dLeft > d - 1) { c2='near';    t2=`⚡${d}天`; }
        else                    { c2='done';     t2=`✓${d}天`; }
        return `<span class="badge ${c2}">${t2}</span>`;
      }).join('');
    }
  }
  tick();
  timers[exam.id] = setInterval(tick, 1000);
}

function toast(msg, dur=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), dur);
}

/* ── 初始化 ── */
const nowDt = new Date();
nowDt.setMinutes(nowDt.getMinutes() - nowDt.getTimezoneOffset());
document.getElementById('dateInput').min = nowDt.toISOString().slice(0,16);

updateNotifyBanner();
render();
exams.forEach(scheduleNotifications);
</script>
</body>
</html>
